<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade</title>
    <style>
        /* Base Styling */
        body {
            background-color: #11141a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* Header Setup */
        .header-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .main-title {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            color: #8a99ad;
            margin: 5px 0 0 0;
            letter-spacing: 1px;
        }

        /* Game Selection Grid - Made wider and cards significantly larger */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); /* Increased minimum card size */
            gap: 40px; /* More spacing for larger layout */
            max-width: 1200px; /* Expanded grid layout area */
            width: 100%;
        }

        /* Smooth-Edged Cards */
        .game-card {
            background-color: #1b202c;
            border-radius: 20px; /* Slightly more rounded for bigger cards */
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            border: 1px solid #2c354a;
            display: flex;
            flex-direction: column;
        }

        .game-card:hover {
            transform: translateY(-8px); /* Higher lift on hover */
            box-shadow: 0 15px 30px rgba(0, 242, 254, 0.25);
            border-color: #00f2fe;
        }

        /* Image Placeholder Slots - Made taller for the bigger cards */
        .game-image-slot {
            width: 100%;
            height: 260px; /* Increased height from 200px */
            background-color: #252d3d;
            background-size: cover;
            background-position: center;
        }

        /* Game Titles */
        .game-info {
            padding: 20px; /* Extra padding */
            text-align: center;
        }

        .game-title {
            margin: 0;
            font-size: 1.6rem; /* Bigger text */
            font-weight: 700;
        }

        /* Game Player Screen - Made massive for better gameplay */
        #game-container {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 1200px; /* Increased from 960px */
            height: 85vh; /* Increased from 70vh to take up most of the screen */
        }

        /* Making your iframes fit perfectly */
        #game-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
        }

        /* Back to Menu Button */
        .back-btn {
            background: #252d3d;
            color: #fff;
            border: 1px solid #2c354a;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 20px;
            align-self: flex-start;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: #ff4757;
            border-color: #ff4757;
        }

                grid-template
